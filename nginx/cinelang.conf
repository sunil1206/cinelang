# CineLang — cinelang.linuslearning.in
# API:      127.0.0.1:8001  (FastAPI  — avoids conflict with goscan on 8000)
# Frontend: 127.0.0.1:3001  (Next.js  — avoids conflict with goscan on 3000)

server {
    listen 80;
    listen [::]:80;
    server_name cinelang.linuslearning.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cinelang.linuslearning.in;

    ssl_certificate     /etc/letsencrypt/live/cinelang.linuslearning.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cinelang.linuslearning.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version  1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    # NextAuth — MUST be before /api/
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3001;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        client_max_body_size 25M;
    }

    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://127.0.0.1:8001;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
