# Nginx site config for cinelang.linuslearning.in
# Placed by deploy.sh at /etc/nginx/sites-available/cinelang
# and symlinked to /etc/nginx/sites-enabled/cinelang

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cinelang.linuslearning.in;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cinelang.linuslearning.in;

    # SSL — managed by certbot (deploy.sh will run certbot after placing this file)
    ssl_certificate     /etc/letsencrypt/live/cinelang.linuslearning.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cinelang.linuslearning.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # ── NextAuth routes → Next.js ─────────────────────────────────────────────
    # Must come BEFORE the generic /api/ block (longer prefix wins)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000;
    }

    # ── FastAPI backend routes ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        # Larger body for SRT uploads
        client_max_body_size 10M;
    }

    # ── FastAPI OpenAPI docs (optional, remove in prod if not needed) ─────────
    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }
    location /redoc {
        proxy_pass http://127.0.0.1:8000;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Next.js static assets (aggressive caching) ───────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
