version: "3.9"

services:
  # ── Redis cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Ollama local LLM (optional) ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles: ["ollama"]

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL:       redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./cinelang.db:/app/cinelang.db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./cinelang-next
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXTAUTH_URL:        http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Nginx (production only) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    profiles: ["production"]

volumes:
  redis_data:
  ollama_data:
