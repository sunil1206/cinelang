version: "3.9"

# CineLang Production
# Ports: 8001 (API) and 3001 (Frontend)
# Reason: 8000 and 3000 are occupied by goscan on this server

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - cinelang_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - cinelang_db:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./cinelang-next
      dockerfile: Dockerfile
      args:
        NEXTAUTH_URL: https://cinelang.linuslearning.in
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXT_PUBLIC_API_URL: ""
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: https://cinelang.linuslearning.in
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  cinelang_redis:
  cinelang_db:
